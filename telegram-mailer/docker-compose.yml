version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mailer
      POSTGRES_PASSWORD: mailerpass
      POSTGRES_DB: telegrammailer
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailer -d telegrammailer"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mailer_net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - mailer_net

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:usOzpBxQwfuHQZTUhISdtxfqdPEREPMk@zephyr.proxy.rlwy.net:12756/railway
      REDIS_URL: redis://default:OyCHIVcRxqYzxKqzGcGuAfowNZtkGlzK@zephyr.proxy.rlwy.net:16119
    env_file:
      - .env
    volumes:
      - ./sessions:/app/sessions
      - ./reports:/app/reports
    command: bot
    networks:
      - mailer_net

  celery_worker:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://postgres:usOzpBxQwfuHQZTUhISdtxfqdPEREPMk@zephyr.proxy.rlwy.net:12756/railway
      REDIS_URL: redis://default:OyCHIVcRxqYzxKqzGcGuAfowNZtkGlzK@zephyr.proxy.rlwy.net:16119
    env_file:
      - .env
    volumes:
      - ./sessions:/app/sessions
      - ./reports:/app/reports
    command: worker
    networks:
      - mailer_net

  celery_beat:
    build: .
    restart: unless-stopped
    depends_on:
      - redis
      - db
    environment:
      DATABASE_URL: postgresql://postgres:usOzpBxQwfuHQZTUhISdtxfqdPEREPMk@zephyr.proxy.rlwy.net:12756/railway
      REDIS_URL: redis://default:OyCHIVcRxqYzxKqzGcGuAfowNZtkGlzK@zephyr.proxy.rlwy.net:16119
    env_file:
      - .env
    command: beat
    networks:
      - mailer_net

networks:
  mailer_net:
    driver: bridge

volumes:
  postgres_data:
  redis_data: